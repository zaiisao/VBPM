# Minimal environment for VBPM. The default (cached-feature) path needs only the "core" deps below;
# the optional end-to-end path (--divergence_end_to_end, uses external/beat_this) adds einops +
# rotary_embedding_torch (+ torchaudio for computing spectrograms from raw audio).
# torch pulls its own transitive deps (sympy, networkx, jinja2, nvidia-cu12 wheels, triton, ...).
# The exact frozen lockfile from the pre-refactor codebase is preserved in git history and the archive.
name: vbpm
channels:
  - conda-forge
dependencies:
  # ---- core (required) ----
  - python=3.10
  - pytorch=2.6.*          # the model + all tensor ops (CUDA build)
  - numpy
  - scipy                  # scipy.signal.find_peaks for peak-picking the read-out
  - pyyaml                 # YAML config loader (config.py)
  - pip
  - pip:
      - mir_eval           # beat/downbeat F-measure
      # ---- optional: end-to-end feature extraction via external/beat_this ----
      - einops
      - rotary_embedding_torch
      - torchaudio         # only needed to extract features from raw audio (not the cached path)
