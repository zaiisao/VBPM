# FIVO on the wave-2 BT corpus -- the cause-level anti-collapse test. Identical to default.yaml
# (the run that collapses to ~0.40 on both seeds) EXCEPT for the FIVO objective term. Success test:
# deployment filter clears the ~0.40 collapse floor at full 2000 steps.
seed: 0
frontend: beat_this

model:
  hidden_size: 64
  num_meters: 4
  emission: parametric
  transition_correction_scale: 0.5
  fixed_prior_scales: null

objective:
  free_bits_nats_per_frame: 0.3
  prior_preserving_free_bits: true
  sawtooth_weight: 0.0
  tempo_slope_weight: 0.5
  meter_ce_weight: 0.1
  fivo_weight: 0.1              # auxiliary weight on the filtering marginal likelihood
  fivo_num_particles: 16        # training particles (deployment still 800)
  fivo_elbo_anneal_steps: 600   # fade ELBO share 1 -> floor so the filter warms up first
  fivo_elbo_floor: 0.3

training:
  train_feature_dir: cache/acts/foldhonest_train_rich
  val_feature_dir: cache/acts/foldhonest_val_rich
  steps: 2000
  batch_size: 32
  crop_frames: 1024
  learning_rate: 1.0e-3
  train_songs: 9999
  save_path: checkpoints/fivo_w2_s0.pt

filter:
  num_particles: 800
  observation_temperature: 3.0
  proposal_tempo_sigma_scale: 0.01
  proposal_phase_concentration_scale: 50.0
  downbeat_evidence_weight: 3.0
  stratified_gauge_init: true
